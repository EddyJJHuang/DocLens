services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATA_DIR: /app/data
      FRONTEND_ORIGIN: http://localhost:3000
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      HYBRID_DENSE_WEIGHT: ${HYBRID_DENSE_WEIGHT:-0.5}
      HYBRID_SPARSE_WEIGHT: ${HYBRID_SPARSE_WEIGHT:-0.5}
      RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-cross-encoder/ms-marco-MiniLM-L-6-v2}
    volumes:
      - ./data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
